<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f7665" />
    <title>掌上食谱簿 | 手机食谱浏览器</title>
    <link rel="stylesheet" href="./viewer.css?v=5" />
  </head>
  <body>
    <div class="scene-noise" aria-hidden="true"></div>
    <div class="scene-glow scene-glow--left" aria-hidden="true"></div>
    <div class="scene-glow scene-glow--right" aria-hidden="true"></div>

    <main class="cookbook-shell">
      <header class="hero">
        <div class="hero__copy">
          <p class="eyebrow">MOBILE COOKBOOK ARCHIVE</p>
          <h1>掌上食谱簿</h1>
          <p class="hero__subtitle">
            用手机逐张查看食谱图，点一下就能标记“已烹饪”，状态会保存在当前浏览器里。
          </p>
        </div>

        <div class="hero__meta">
          <article class="summary-card">
            <span>已完成</span>
            <strong id="doneMetric">0 / 0</strong>
            <p id="progressText">正在读取图片清单…</p>
          </article>

          <a class="utility-link" href="./splitter.html">打开切图工具</a>
        </div>
      </header>

      <section class="viewer-layout">
        <article class="stage-card">
          <div class="stage-card__head">
            <div>
              <p class="eyebrow">CURRENT CARD</p>
              <h2 id="recipeTitle">准备载入</h2>
            </div>
            <span class="counter-badge" id="recipeCounter">0 / 0</span>
          </div>

          <div class="image-stage" id="imageStage">
            <div class="image-stage__placeholder" id="imagePlaceholder">
              <strong>食谱图片会显示在这里</strong>
              <span>如果你后续放入 500 多张图，只要刷新图片清单后重新部署即可。</span>
            </div>

            <img id="recipeImage" alt="" hidden />
          </div>

          <div class="stage-actions">
            <button class="stage-action stage-action--nav" id="prevButton" type="button" aria-label="上一张">
              <span class="stage-action__icon" aria-hidden="true">‹</span>
              <span class="stage-action__label">上一张</span>
            </button>

            <button
              class="stage-action stage-action--cook"
              id="toggleCookedButton"
              type="button"
              aria-label="标记已做"
              aria-pressed="false"
            >
              <span class="cook-toggle__box" aria-hidden="true"></span>
              <span class="stage-action__label">标记已做</span>
            </button>

            <button
              class="stage-action stage-action--overview"
              id="overviewButton"
              type="button"
              aria-label="打开总览"
              aria-controls="overviewModal"
              aria-expanded="false"
            >
              <span class="stage-action__icon" aria-hidden="true">▦</span>
              <span class="stage-action__label">总览</span>
            </button>
            <button class="stage-action stage-action--nav" id="nextButton" type="button" aria-label="下一张">
              <span class="stage-action__icon" aria-hidden="true">›</span>
              <span class="stage-action__label">下一张</span>
            </button>
          </div>

          <section class="stage-meta">
            <h3 id="recipeFileName">尚未载入图片</h3>
            <p id="recipeHint">左右切换查看图片，也可以打开总览快速跳转。</p>
          </section>
        </article>
      </section>
    </main>

    <div class="overview-modal" id="overviewModal" hidden>
      <div class="overview-modal__backdrop" id="overviewBackdrop"></div>
      <section class="overview-modal__panel" aria-labelledby="overviewTitle" aria-modal="true" role="dialog">
        <div class="overview-modal__head">
          <div>
            <p class="eyebrow">RECIPE OVERVIEW</p>
            <h2 id="overviewTitle">食谱总览</h2>
          </div>
          <button class="overview-modal__close" id="overviewCloseButton" type="button" aria-label="关闭总览">
            <span aria-hidden="true">×</span>
          </button>
        </div>

        <p class="overview-modal__stats" id="overviewStats">正在整理总览…</p>
        <div class="overview-grid" id="overviewGrid"></div>
      </section>
    </div>

    <div class="toast" id="toast" hidden></div>

    <script src="./recipes-manifest.js?v=5"></script>
    <script src="./viewer.js?v=5"></script>
  </body>
</html>
