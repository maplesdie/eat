<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f7665" />
    <title>掌上食谱簿 | 手机食谱浏览器</title>
    <link rel="stylesheet" href="./viewer.css?v=3" />
  </head>
  <body>
    <div class="scene-noise" aria-hidden="true"></div>
    <div class="scene-glow scene-glow--left" aria-hidden="true"></div>
    <div class="scene-glow scene-glow--right" aria-hidden="true"></div>

    <main class="cookbook-shell">
      <header class="hero">
        <div class="hero__copy">
          <p class="eyebrow">MOBILE COOKBOOK ARCHIVE</p>
          <h1>掌上食谱簿</h1>
          <p class="hero__subtitle">
            用手机逐张查看食谱图，点一下就能标记“已烹饪”，状态会保存在当前浏览器里。
          </p>
        </div>

        <div class="hero__meta">
          <article class="summary-card">
            <span>已完成</span>
            <strong id="doneMetric">0 / 0</strong>
            <p id="progressText">正在读取图片清单…</p>
          </article>

          <a class="utility-link" href="./splitter.html">打开切图工具</a>
        </div>
      </header>

      <section class="viewer-layout">
        <article class="stage-card">
          <div class="stage-card__head">
            <div>
              <p class="eyebrow">CURRENT CARD</p>
              <h2 id="recipeTitle">准备载入</h2>
            </div>
            <span class="counter-badge" id="recipeCounter">0 / 0</span>
          </div>

          <div class="image-stage" id="imageStage">
            <button class="image-nav image-nav--prev" id="prevButton" type="button" aria-label="上一张">
              <span aria-hidden="true">‹</span>
            </button>

            <button
              class="cook-toggle"
              id="toggleCookedButton"
              type="button"
              aria-label="标记已做"
              aria-pressed="false"
            >
              <span class="cook-toggle__box" aria-hidden="true"></span>
            </button>

            <button class="image-nav image-nav--next" id="nextButton" type="button" aria-label="下一张">
              <span aria-hidden="true">›</span>
            </button>

            <div class="image-stage__placeholder" id="imagePlaceholder">
              <strong>食谱图片会显示在这里</strong>
              <span>如果你后续放入 500 多张图，只要刷新图片清单后重新部署即可。</span>
            </div>

            <img id="recipeImage" alt="" hidden />
          </div>

          <div class="scrubber">
            <div class="scrubber__head">
              <label for="recipeSlider">浏览进度</label>
              <output id="sliderLabel">--</output>
            </div>
            <input id="recipeSlider" type="range" min="1" max="1" value="1" />
          </div>
        </article>

        <aside class="control-card">
          <section class="detail-block">
            <p class="eyebrow">DETAILS</p>
            <h3 id="recipeFileName">尚未载入图片</h3>
            <p id="recipeHint">左右切换查看图片，也可以拖动滑块快速跳转。</p>
          </section>

          <section class="progress-panel">
            <div class="progress-panel__head">
              <span>完成率</span>
              <strong id="progressPercent">0%</strong>
            </div>
            <div class="progress-bar" aria-hidden="true">
              <span id="progressFill"></span>
            </div>
            <p id="progressCaption">已标记 0 张，未标记 0 张。</p>
          </section>

          <section class="thumb-panel" aria-labelledby="thumbPanelTitle">
            <div class="thumb-panel__head">
              <h3 id="thumbPanelTitle">附近食谱</h3>
              <span id="thumbRangeLabel">--</span>
            </div>
            <div class="thumb-strip" id="thumbStrip"></div>
          </section>

          <p class="storage-note">
            标记状态保存在当前浏览器的本地存储里。换设备或清空浏览器数据后需要重新标记。
          </p>
        </aside>
      </section>
    </main>

    <div class="toast" id="toast" hidden></div>

    <script src="./recipes-manifest.js?v=3"></script>
    <script src="./viewer.js?v=3"></script>
  </body>
</html>
